<!DOCTYPE html>
<html lang="hr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt - Photo Portfolio</title>
    <link rel="stylesheet" href="stil.css">
</head>
<body data-page="contact">

    <header class="site-header">
        <div class="container">
            <a class="logo" href="index.html">Photo Portfolio</a>
            <input type="checkbox" id="nav-toggle" class="nav-toggle">
            <label for="nav-toggle" class="nav-toggle-label" aria-label="Otvori izbornik">
                <span></span>
            </label>
            <nav aria-label="Glavna navigacija">
                <ul>
                    <li><a href="index.html">Početna</a></li>
                    <li><a href="o-meni.html">O meni</a></li>
                    <li><a href="projekti.html">Projekti</a></li>
                    <li><a class="active" aria-current="page" href="kontakt.html">Kontakt</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main id="main">
        <section class="container">
            <h1>Kontakt</h1>
            <p>Pošaljite mi poruku za suradnju.</p>

            <form action="#" method="post" style="display: grid; gap: 15px; max-width: 500px;">
                <label for="ime">Ime i prezime:</label>
                <input type="text" id="ime" name="ime" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="poruka">Vaša poruka:</label>
                <textarea id="poruka" name="poruka" rows="5" required></textarea>

                <button type="submit" class="btn">Pošalji</button>
            </form>
        </section>
    </main>

</body>
</html>
